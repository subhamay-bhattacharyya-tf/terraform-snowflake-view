name: Terraform CI
run-name: CI run by ${{ github.actor }} on ${{ github.ref_name }}

on:
  push:
    branches:
      - 'main'
      - 'feature/**'
      - 'bug/**'
    paths:
      - '*.tf'
      - 'examples/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - '*.tf'
      - 'examples/**'
      - 'tests/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt hashicorp/setup-terraform@v3 (and any other Node.js 20 actions) into the
  # Node.js 24 runtime ahead of the GitHub Actions deprecation deadline (2026-06-02).
  # Remove this once all referenced actions ship a Node.js 24 release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ============================================================================
  # Terraform Validate
  # ============================================================================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    env:
      TF_VERSION: ${{ vars.TERRAFORM_VERSION || '1.5.0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # ============================================================================
  # Validate Examples
  # ============================================================================
  examples-validate:
    name: Validate Snowflake View Examples
    runs-on: ubuntu-latest
    needs: terraform-validate
    env:
      TF_VERSION: ${{ vars.TERRAFORM_VERSION || '1.5.0' }}
    strategy:
      matrix:
        example:
          - examples/basic
          - examples/secure-view
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ matrix.example }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.example }}

  # ============================================================================
  # Terratest Integration Tests
  # ============================================================================
  terratest:
    name: Snowflake View Terratest
    runs-on: ubuntu-latest
    needs: examples-validate
    env:
      TF_VERSION: ${{ vars.TERRAFORM_VERSION || '1.5.0' }}
      GO_VERSION: '1.22'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: tests/go.sum

      - name: Download Go Dependencies
        run: |
          go mod tidy
          go mod download
        working-directory: tests

      - name: Run Terratest - TestSnowflakeViewBasic
        id: snowflake-view-basic-test
        run: |
          set -o pipefail
          go test -v -timeout 30m -run TestSnowflakeViewBasic 2>&1 | tee snowflake_view_basic_output.txt
          echo "## Snowflake View Basic Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat snowflake_view_basic_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: tests
        env:
          SNOWFLAKE_ACCOUNT:       ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:          ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY:   ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE:          ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE:     ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_TEST_DATABASE: ${{ vars.SNOWFLAKE_TEST_DATABASE }}
          SNOWFLAKE_TEST_SCHEMA:   ${{ vars.SNOWFLAKE_TEST_SCHEMA }}

  # ============================================================================
  # Generate Change Log
  # ============================================================================

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: examples-validate
    if: github.ref != 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push

  # ============================================================================
  # Semantic Release
  # ============================================================================
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [examples-validate, terratest]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer@13.0.0
            @semantic-release/release-notes-generator@14.0.0
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            @semantic-release/github@11.0.0
            conventional-changelog-conventionalcommits@9.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}