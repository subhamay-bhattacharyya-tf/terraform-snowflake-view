name: Snowflake View Terraform CI
run-name: snowflake-view CI by ${{ github.actor }} on ${{ github.ref_name }}

on:
  push:
    branches:
      - 'main'
      - 'feature/**'
      - 'bug/**'
    paths:
      - '*.tf'
      - 'examples/**'
      - 'tests/**'
      - 'utils/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - '*.tf'
      - 'examples/**'
      - 'tests/**'
      - 'utils/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_VERSION: ${{ vars.TERRAFORM_VERSION || '1.5.0' }}

jobs:
  # ============================================================================
  # Validate the snowflake-view module (fmt + init + validate + lint)
  # ============================================================================
  terraform-validate:
    name: Snowflake View Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Lint (tflint + trivy)
        run: bash utils/lint.sh

  # ============================================================================
  # Validate every example calls the snowflake-view module cleanly
  # ============================================================================
  examples-validate:
    name: Snowflake View Examples Validate
    runs-on: ubuntu-latest
    needs: terraform-validate
    strategy:
      matrix:
        example:
          - examples/basic
          - examples/secure-view
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ matrix.example }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.example }}

  # ============================================================================
  # Real Snowflake integration test against examples/basic via Terratest
  # ============================================================================
  snowflake-view-terratest:
    name: Snowflake View Terratest
    runs-on: ubuntu-latest
    needs: examples-validate
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: tests/go.sum

      - name: Run snowflake-view Terratest
        run: go test -v -timeout 30m -run TestSnowflakeViewBasic ./...
        working-directory: tests
        env:
          SNOWFLAKE_ACCOUNT:       ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:          ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY:   ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE:          ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE:     ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_TEST_DATABASE: ${{ vars.SNOWFLAKE_TEST_DATABASE }}
          SNOWFLAKE_TEST_SCHEMA:   ${{ vars.SNOWFLAKE_TEST_SCHEMA }}

      - name: Refresh README badge (passing)
        if: success()
        env:
          BADGE_GIST_ID: ${{ secrets.BADGE_GIST_ID }}
          BADGE_LABEL: snowflake-view
          BADGE_MESSAGE: passing
          BADGE_COLOR: brightgreen
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: bash utils/update-badge.sh

  # ============================================================================
  # Doc drift — README must match the current module surface
  # ============================================================================
  docs-drift:
    name: Snowflake View Docs Drift
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install terraform-docs
        run: |
          curl -sSLo /tmp/td.tar.gz \
            https://terraform-docs.io/dl/v0.18.0/terraform-docs-v0.18.0-linux-amd64.tar.gz
          tar -xzf /tmp/td.tar.gz -C /tmp terraform-docs
          sudo install -m 0755 /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version

      - name: Regenerate README sections
        run: bash utils/generate-docs.sh

      - name: Re-align README GFM tables
        run: python3 utils/align-md-tables.py README.md

      - name: Fail on README drift
        run: |
          if ! git diff --quiet -- README.md; then
            echo "::error::README.md is out of sync with the snowflake-view module surface. Run 'bash utils/generate-docs.sh && python3 utils/align-md-tables.py README.md' locally and commit the result."
            git --no-pager diff -- README.md
            exit 1
          fi

  # ============================================================================
  # Generate Changelog (non-main branches)
  # ============================================================================
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: examples-validate
    if: github.ref != 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push

  # ============================================================================
  # Semantic Release (main branch only)
  # ============================================================================
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [snowflake-view-terratest, examples-validate, docs-drift]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Semantic Release
        id: semrel
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh README badge (released version)
        if: steps.semrel.outputs.new_release_published == 'true'
        env:
          BADGE_GIST_ID: ${{ secrets.BADGE_GIST_ID }}
          BADGE_LABEL: snowflake-view
          BADGE_MESSAGE: v${{ steps.semrel.outputs.new_release_version }}
          BADGE_COLOR: blue
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: bash utils/update-badge.sh
